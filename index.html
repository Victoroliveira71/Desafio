<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <script src="https://kit.fontawesome.com/1f679355a0.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <main>
     <section class="container">
         <article class="input">
             <h1>Minhas Tarefas</h1>
             <input type="text" name="text" id="itext" placeholder="digite uma nova tarefa..."> <button>adicionar</button>

         <article class="info">
            <div class="geral">Todas</div>
            <div class="off">Pendentes</div>
            <div>Concluidas</div>
         </article>
         <article class="list">
            <div>Estudar CSS <i class="fa-solid fa-x"></i></div>
            <div> <del>Criar layout</del><i class="fa-solid fa-x"></i></div>
         </article>
         <footer>2 tarefas | 1 Concluida</footer>
     </section>
   </main>
</body>
</html>
