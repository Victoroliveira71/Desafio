<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <script src="https://kit.fontawesome.com/1f679355a0.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <header>
            <h1>Minhas Tarefas</h1>
            <input type="text" name="text" id="itext" placeholder="digite uma nova tarefa...">
            <button>Adicionar</button>
        </header>

        <section class="task-list">
            <div>Todas</div>
            <div>Pendentes</div>
            <div>Concluídas</div>
        </section>

        <section>
            <label class="list">
                <span><input type="checkbox" name="chek" id="ichek">Estudar CSS</span>
                <span><i class="fa-solid fa-x"></i></span>
            </label>

            <label class="list">
                <span><input type="checkbox" name="chek" id="ichek">Criar Layout</span>
                <span><i class="fa-solid fa-x"></i></span>
            </label>
        </section>

        <footer>2 Tarefas | 0 Concluída</footer>
    </div>
</body>
</html>
